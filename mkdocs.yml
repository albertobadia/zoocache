site_name: ZooCache
site_description: ZooCache is a high-performance caching library with a Rust core, designed for consistency and read performance.
site_url: https://zoocache.readthedocs.io/

theme:
  name: material
  logo: assets/logo-light.svg
  favicon: assets/favicon.svg
  features:
    - navigation.indexes
    - navigation.expand
    - content.code.copy
  palette:
    # Light mode
    - scheme: default
      primary: orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings
  - include-markdown

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - md_in_html
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

nav:
  - Home: index.md
  - 📖 Tutorials:
      - Quick Start & Installation: setup.md
  - 🛠️ How-to Guides:
      - Web Frameworks:
          - Django:
              - Overview: django.md
              - Detailed Guide: django_user_guide.md
              - Auto Serializers: django_serializers.md
          - FastAPI: fastapi.md
          - Litestar: litestar.md
      - Tools:
          - CLI / TUI: cli.md
      - Telemetry:
          - Overview: telemetry/index.md
          - Prometheus: telemetry/prometheus.md
          - OpenTelemetry: telemetry/otel.md
      - Troubleshooting: troubleshooting.md
  - 💡 Explanations:
      - Core Concepts: concepts.md
      - Configuration:
          - General: configuration/index.md
          - Storage Backends: configuration/storage.md
      - Distributed Mode: distributed.md
      - Architecture: architecture.md
      - Semantic Invalidation: invalidation.md
      - Distributed Consistency: consistency.md
      - Concurrency (SingleFlight): concurrency.md
      - Serialization: serialization.md
      - Reliability & Edge Cases: reliability.md
      - Architecture Decisions (ADR):
          - "ADR 0001: Prefix-Trie Invalidation": adr/0001-prefix-trie-invalidation.md
          - "ADR 0002: Rust Core Python Wrapper": adr/0002-rust-core-python-wrapper.md
          - "ADR 0003: HLC Distributed Consistency": adr/0003-hlc-distributed-consistency.md
          - "ADR 0004: Serialization Strategy": adr/0004-serialization-strategy.md
          - "ADR 0005: Singleflight Pattern": adr/0005-singleflight-pattern.md
          - "ADR 0006: Trie Performance Optimizations": adr/0006-trie-performance-optimizations.md
          - "ADR 0007: Zero-Bridge Serialization": adr/0007-zero-bridge-serialization.md
          - "ADR 0008: Redis Bus Connection Pooling": adr/0008-redis-bus-connection-pooling.md
          - "ADR 0009: Robust Sync & Error Handling": adr/0009-robust-sync-and-error-handling.md
  - 📚 Reference:
      - API Reference: reference/api.md
